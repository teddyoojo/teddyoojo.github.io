<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      media="screen"
      href="https://fontlibrary.org//face/grundschrift"
      type="text/css"
    />
    <link
      rel="stylesheet"
      href="//code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css"
    />
    <link rel="stylesheet" href="/resources/demos/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="styleNeu.css" type="text/css" />
    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
    <title>Punktefelder</title>
  </head>
  <body>
    <!--Navbar-->
    <nav class="navbar navbar-expand-lg" style="background-color: #c2f8f4">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Punktefelder</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="#">Dienes 1</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Dienes 2</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container text-center">
      <div class="row">
        <div class="col-8">
          <h2 id="exercise"></h2>
          <div id="droppable" class="ui-widget-header">
            <p id="counter">Drop here</p>
            <i id="trash" class="bi bi-trash"></i>
          </div>
        </div>
        <div class="col-4">
          <h2>Diese Elemente kannst du benutzen</h2>
          <div id="draggableHundreds" class="draggable-hundreds"></div>
          <div id="draggableTens" class="draggable-tens"><p></p></div>
          <div id="draggableOnes" class="draggable-ones"><p></p></div>
          <div class="d-grid gap-2 col-6 mx-auto">
            <button
              id="submitBtn"
              type="button"
              class="btn btn-success btn-lg left-icon-holder"
              onclick="submitBtnClicked()"
            >
              <i class="bi bi-truck"></i>
              Abgeben!
            </button>
            <button
              id="refreshBtn"
              class="btn btn-primary btn-lg left-icon-holder"
              onclick="refreshBtnClicked()"
            >
              <i class="bi bi-arrow-clockwise"></i>Neue Aufgabe
            </button>
          </div>
        </div>
      </div>
    </div>
	<div id="myModal" class="modal">
		<!-- Modal content -->
		<div class="modal-content">
		  <h1 id="solution"></h1>
		  <button class="close" id="closeBtn" onclick="closeModal()"></span>
		</div>
	  </div>
  </body>
  <script type="text/javascript" src="dienesNeu.js"></script>
</html>
