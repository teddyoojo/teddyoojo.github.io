    <style>

        background-size: 225px;

        left: 20px;
        cursor: pointer;
      }

      .hundreds-resized {
        background-image: url("https://i.imgur.com/2l23vHF.jpg");

      .container {

      .row-one {
        height: 160px;
        width: 1000px;

      .row-two {
        height: 250px;

        justify-content: space-around;

      .row-three {
        height: 100px;
        width: 1000px;
        padding: 25px;
        display: flex;
        justify-content: space-around;
      }
      .row-four {
        height: 100px;
        width: 1000px;
        padding: 25px;
        display: flex;
        justify-content: space-around;
      }

      .row-five {
        height: 160px;
        width: 1000px;
        padding: 25px;

      }

      .col-4 {

      }

        height: 180px;
        width: 400px;
        padding: 25px;
        display: flex;
        justify-content: space-around;
      }
      /* The Modal (background) */
      .modal {
        display: none; /* Hidden by default */
        position: fixed; /* Stay in place */
        z-index: 1; /* Sit on top */
        left: 0;
        top: 0;
        width: 100%; /* Full width */
        height: 100%; /* Full height */
        overflow: auto; /* Enable scroll if needed */
        background-color: rgb(0, 0, 0); /* Fallback color */
        background-color: rgba(0, 0, 0, 0.4); /* Black w/ opacity */
      }

      /* Modal Content/Box */
      .modal-content {
        text-align: center;
        background-color: #bcfdff;
        margin: 15% auto; /* 15% from the top and centered */
        padding: 20px;
        border: 5px solid  #00868b;
        width: 35%; /* Could be more or less, depending on screen size */
      }

      /* The Close Button */
      .close {
        background-color: rgb(17, 192, 84);
        color: rgb(0, 0, 0);
        float: none;
        font-size: 28px;
        font-weight: bold;
      }
      .left-icon-holder {
    position:relative;
}
.left-icon-holder .bi {
    position:absolute;
    line-height: 24px;
    top:50%;
    margin-top: -12px; /* Half of line height to keep left middle postion of container */
    left: 10px;
}

    <h1 style="background-color: #00868b">Punktfelder!</h1>
    <div class="container text-center">
      <div class="row" id="count-row">
        <div class="col-8">
          <h2 id="exercise"></h2>
          <div class="count-field">
            <div class="row-one"></div>
            <div class="row-two"></div>
            <div class="row-three"></div>
            <div class="row-four"></div>
            <div class="row-five"></div>
          </div>
        </div>
        <div class="col-4">
          <h2>Verfügbare Zahlenfelder!</h2>
          <div class="row justify-content-center">
            <div class="right-row-one">
              <div class="hundreds" draggable="true"></div>
            </div>
            <div class="right-row-two">
              <div class="tens" draggable="true"></div>
            </div>
            <div class="right-row-three">
              <div class="ones" draggable="true"></div>
            </div>
          </div>
          <div class="d-grid gap-2 col-6 mx-auto">
            <button
              id="submitBtn"
              type="button"
              class="btn btn-success btn-lg left-icon-holder"
              onclick="submitBtnClicked()"
            >
            <i class="bi bi-check-all"></i>
              Abgeben!
            </button>
            <button class="btn btn-primary btn-lg left-icon-holder" onclick="refreshBtnClicked()"><i class="bi bi-arrow-clockwise"></i>Neue Aufgabe</button>
            <button class="btn btn-info btn-lg left-icon-holder" onclick="clearCountField()"><i class="bi bi-arrow-90deg-left"></i>Feld leeren!</button>
        </div>
        </div>

    <div id="myModal" class="modal">
      <!-- Modal content -->
      <div class="modal-content">
        <h1 id="solution"></h1>
        <button class="close" id="closeBtn" onclick="closeModal()"></span>
      </div>
